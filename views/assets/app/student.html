<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil do Aluno — TrainiFy</title>
  <link rel="stylesheet" href="../../assets/_common/styles/reset.css" />
  <link rel="stylesheet" href="../../assets/_common/styles/global.css" />
  <link rel="stylesheet" href="../../assets/app/styles/app-layout.css" />
  <link rel="stylesheet" href="../../assets/app/styles/student.css" />
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="app-shell">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="appSidebar">
      <div class="sidebar-logo">
        <img src="../../assets/_common/images/logo.svg" alt="TrainiFy" />
      </div>
      <nav class="sidebar-nav">
        <span class="nav-section-label">Principal</span>
        <a class="nav-item" href="dashboard.html" data-href="dashboard"><span class="nav-icon">◼</span> Dashboard</a>
        <a class="nav-item active" href="students.html" data-href="students"><span class="nav-icon">👥</span> Alunos</a>
        <span class="nav-section-label">Conta</span>
        <a class="nav-item" href="profile.html" data-href="profile"><span class="nav-icon">👤</span> Meu Perfil</a>
        <a class="nav-item" href="#" data-action="logout"><span class="nav-icon">↩</span> Sair</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-widget">
          <div class="user-avatar" id="sidebarUserInitials">PT</div>
          <div class="user-info">
            <div class="user-name" id="sidebarUserName">Personal Trainer</div>
            <div class="user-role">Treinador</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- ── TOPBAR ── -->
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="icon-btn show-mobile" id="sidebarOpenBtn">☰</button>
        <div>
          <a href="students.html" style="font-size:0.82rem;color:var(--clr-grey-500);">← Alunos</a>
          <h1 class="topbar-title" id="topbarTitle">Perfil do Aluno</h1>
        </div>
      </div>
      <div class="topbar-actions">
        <span style="font-size:0.85rem;color:var(--clr-grey-300);" id="topbarUserName"></span>
      </div>
    </header>

    <!-- ── MAIN ── -->
    <main class="main-content">
      <div id="studentContent">
        <div style="text-align:center;padding:64px;">
          <span class="spinner"></span>
          <p style="color:var(--clr-grey-500);margin-top:12px;">Carregando perfil...</p>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay hidden" id="workoutModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="workoutModalTitle">
      <div class="modal-header">
        <div>
          <h2 id="workoutModalTitle">Treino</h2>
          <p id="workoutModalSubtitle" class="modal-subtitle">Detalhes do treino e exercícios</p>
        </div>
        <button class="icon-btn" type="button" data-action="close-workout-modal" aria-label="Fechar modal">✕</button>
      </div>
      <div class="modal-body" id="workoutModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" type="button" data-action="toggle-workout-edit">Editar treino</button>
        <button class="btn btn-ghost" type="button" data-action="add-workout-exercise">Adicionar exercício</button>
        <button class="btn btn-primary" type="button" data-action="save-workout-changes">Salvar alterações</button>
      </div>
    </div>
  </div>

  <script src="scripts/app-layout.js" defer></script>
  <script src="scripts/student.js" defer></script>
</body>
</html>
