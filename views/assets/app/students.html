<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alunos — TrainiFy</title>
  <link rel="stylesheet" href="../../assets/_common/styles/reset.css" />
  <link rel="stylesheet" href="../../assets/_common/styles/global.css" />
  <link rel="stylesheet" href="../../assets/app/styles/app-layout.css" />
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="app-shell">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="appSidebar">
      <div class="sidebar-logo">
        <img src="../../assets/_common/images/logo.svg" alt="TrainiFy" />
      </div>
      <nav class="sidebar-nav">
        <span class="nav-section-label">Principal</span>
        <a class="nav-item" href="dashboard.html" data-href="dashboard"><span class="nav-icon">◼</span> Dashboard</a>
        <a class="nav-item active" href="students.html" data-href="students"><span class="nav-icon">👥</span> Alunos</a>
        <span class="nav-section-label">Conta</span>
        <a class="nav-item" href="profile.html" data-href="profile"><span class="nav-icon">👤</span> Meu Perfil</a>
        <a class="nav-item" href="#" data-action="logout"><span class="nav-icon">↩</span> Sair</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-widget">
          <div class="user-avatar" id="sidebarUserInitials">PT</div>
          <div class="user-info">
            <div class="user-name" id="sidebarUserName">Personal Trainer</div>
            <div class="user-role">Treinador</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- ── TOPBAR ── -->
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="icon-btn show-mobile" id="sidebarOpenBtn">☰</button>
        <h1 class="topbar-title">Alunos</h1>
      </div>
      <div class="topbar-search hide-mobile">
        <input type="search" id="topbarSearch" placeholder="Buscar por nome ou email..." />
      </div>
      <div class="topbar-actions">
        <span style="font-size:0.85rem;color:var(--clr-grey-300);" id="topbarUserName"></span>
      </div>
    </header>

    <!-- ── MAIN ── -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h2 class="page-title">Meus Alunos</h2>
          <p class="page-subtitle">
            <span id="studentsCount">—</span> alunos cadastrados
          </p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" id="addStudentBtn">+ Novo Aluno</button>
        </div>
      </div>

      <!-- Stats summary -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-card-label">Total de Alunos</div>
          <div class="stat-card-value neon" id="statStudents">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Ativos</div>
          <div class="stat-card-value" id="statActive">—</div>
          <div class="stat-card-delta up">↑</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Iniciantes</div>
          <div class="stat-card-value" id="statBeginner">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Avançados</div>
          <div class="stat-card-value" id="statAdvanced">—</div>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <div class="table-toolbar">
          <span class="table-toolbar-title">Lista de Alunos</span>
          <div class="table-filters">
            <input class="filter-input" type="search" id="searchInput" placeholder="🔍  Buscar aluno..." />
            <select class="filter-select" id="levelFilter">
              <option value="">Todos os níveis</option>
              <option value="beginner">Iniciante</option>
              <option value="intermediate">Intermediário</option>
              <option value="advanced">Avançado</option>
            </select>
            <select class="filter-select" id="statusFilter">
              <option value="">Todos os status</option>
              <option value="active">Ativo</option>
              <option value="inactive">Inativo</option>
            </select>
          </div>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th>Aluno</th>
              <th>Telefone</th>
              <th>Nível</th>
              <th>Academia</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="studentsTableBody">
            <tr><td colspan="5" style="text-align:center;padding:32px;"><span class="spinner"></span></td></tr>
          </tbody>
        </table>

        <div style="display:flex;justify-content:flex-end;padding:var(--space-md) var(--space-lg);gap:8px;" id="pagination"></div>
      </div>

    </main>
  </div>

  <script src="../../assets/app/scripts/app-layout.js" defer></script>
  <script src="../../assets/app/scripts/students.js" defer></script>
</body>
</html>
